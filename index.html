<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Portfolio Terminal</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f1c00;
    background-image: url("background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .terminal-wrapper {
    width: 1500px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    background: rgba(10, 18, 35, 0);
    border: 1px solid rgba(155, 233, 168, 0.13);
    border-radius: 10px;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  .input-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 13px 24px;
    border-bottom: 1px solid rgba(155, 233, 168, 0.12);
    background: rgba(10, 18, 35, 0);
    gap: 0;
  }

  .p-user  { color: #529f5b; font-size: 20px; font-weight: bold; }
  .p-rest  { color: #e8e8e8; font-size: 20px; margin-right: -3px; }

  #cmd {
    background: transparent;
    border: none;
    outline: none;
    color: #6ddb7a;
    font-family: "Courier New", monospace;
    font-size: 20px;
    flex: 1;
    caret-color: #6ddb7a;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 18px 24px 12px 24px;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: rgba(155,233,168,0.2) transparent;
  }
  #output::-webkit-scrollbar { width: 5px; }
  #output::-webkit-scrollbar-thumb { background: rgba(155,233,168,0.2); border-radius: 3px; }

  #out-inner { margin-top: 0; }

  .line {
    font-size: 18px;
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .g  { color: #6ddb7a; }
  .w  { color: #e8e8e8; }
  .d  { color: rgba(232,232,232,0.4); font-size: 13px; }
  .r  { color: #ff6b6b; }

  hr.sep {
    border: none;
    border-top: 1px solid rgba(232,232,232,0.25);
    margin: 3px 0;
  }

  hr.proj-sep {
    border: none;
    border-top: 1px solid rgba(109,219,122,0.12);
    margin: 18px 0;
  }

  .echo {
    font-size: 18px;
    line-height: 1.85;
    margin-top: 4px;
  }

  .contact-link {
    color: #6ddb7a;
    text-decoration: none;
  }
  .contact-link:hover {
    text-decoration: underline;
    color: #9be9a8;
  }

  .hint-bar {
    flex-shrink: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 5px 24px 8px 24px;
    border-top: 1px solid rgba(155,233,168,0.08);
    background: rgba(10,18,35,0.3);
    font-size: 20px;
    gap: 3px;
  }
  .hint-bar .hw { color: #e8e8e8; }
  .hint-bar .hg { color: #6ddb7a; }

  /* whoami */
  .whoami-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0 14px 0;
  }
  .whoami-top {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .avatar-ring {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 2px solid #6ddb7a;
    box-shadow: 0 0 24px rgba(109,219,122,0.35);
    background: rgba(109,219,122,0.07);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-ring img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .whoami-name { color:#6ddb7a; font-size:24px; font-weight:bold; text-align:center; }
  .whoami-title { color:#e8e8e8; font-size:18px; text-align:center; line-height:1.75; }
  .whoami-title .univ { color:#6ddb7a; }
  .whoami-hr { width:60%; border:none; border-top:1px solid rgba(232,232,232,0.2); margin-bottom:20px; }
  .whoami-bio { width:100%; font-size:16px; line-height:1.95; color:#e8e8e8; }
  .whoami-bio .bio-title { color:#6ddb7a; font-size:17px; font-weight:bold; margin-bottom:10px; }
  .whoami-bio p { margin-bottom:13px; }

  /* project card — vertical layout */
  .proj-card { display: flex; flex-direction: column; gap: 0; }

  .proj-name {
    color: #6ddb7a;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 5px;
  }

  .proj-tags { margin-bottom: 8px; }

  .proj-tag {
    display: inline-block;
    font-size: 12px;
    color: #529f5b;
    border: 1px solid rgba(82,159,91,0.4);
    border-radius: 3px;
    padding: 0 7px;
    margin-right: 5px;
    margin-bottom: 4px;
  }

  .proj-bullets {
    list-style: none;
    padding: 0;
    margin: 0 0 14px 0;
  }

  .proj-bullets li {
    font-size: 15px;
    color: #e8e8e8;
    line-height: 1.75;
    padding-left: 16px;
    position: relative;
  }

  .proj-bullets li::before {
    content: "›";
    position: absolute;
    left: 0;
    color: #529f5b;
  }

  /* 3-image row */
  .proj-imgs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 4px;
  }

  .proj-img-slot {
    aspect-ratio: 16 / 9;
    border-radius: 6px;
    border: 1px solid rgba(109,219,122,0.22);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    overflow: hidden;
    background: rgba(8, 20, 12, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .proj-img-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .proj-img-slot .ph {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    height: 100%;
    color: rgba(109,219,122,0.3);
    font-size: 12px;
    letter-spacing: 0.03em;
  }

  .proj-img-slot .ph svg {
    opacity: 0.28;
  }

</style>
</head>
<body>

<div class="terminal-wrapper">

  <div class="input-bar">
    <span class="p-user">ali</span><span class="p-rest">@portfolio:~$&nbsp;</span>
    <input id="cmd" autofocus autocomplete="off" spellcheck="false">
  </div>

  <div id="output">
    <div id="out-inner">
      <div class="line g" style="font-size:22px; font-weight:bold; margin-bottom:4px;">Welcome to Ali's Portfolio</div>
      <div class="line w" style="font-size:18px; margin-bottom:6px;">Type a command to begin:</div>
      <hr class="sep">
      <div class="line g" style="font-size:18px; margin-bottom:2px;">Available Commands:</div>
      <div class="line" style="font-size:17px;"><span class="g">⟫ whoami</span><span class="w">        — Learn more about me</span></div>
      <div class="line" style="font-size:17px;"><span class="g">⟫ skills</span><span class="w">        — See my skills</span></div>
      <div class="line" style="font-size:17px;"><span class="g">⟫ projects</span><span class="w">      — View my projects</span></div>
      <div class="line" style="font-size:17px;"><span class="g">⟫ contact</span><span class="w">       — Get in touch</span></div>
      <div class="line" style="font-size:17px;"><span class="g">⟫ clear</span><span class="w">         — Clear the screen</span></div>
      <div class="line" style="font-size:17px;"><span class="g">⟫ help</span><span class="w">          — Show commands</span></div>
    </div>
  </div>

  <div class="hint-bar">
    <span class="hw">Hint:&nbsp; Type </span><span class="hg">"help"</span><span class="hw"> for commands.</span>
  </div>

</div>

<script>
  const input  = document.getElementById("cmd");
  const outEl  = document.getElementById("output");
  const inner  = document.getElementById("out-inner");

  let cmdHistory = [];
  let histIdx    = -1;

  input.addEventListener("keydown", function(e) {
    if (e.ctrlKey && e.key === "c") {
      e.preventDefault();
      inner.innerHTML = "";
      addEcho(input.value + "^C");
      input.value = "";
      histIdx = -1;
      return;
    }
    if (e.key === "Enter") {
      const raw = input.value;
      const cmd = raw.trim().toLowerCase();
      input.value = "";
      histIdx = -1;
      if (!raw.trim()) return;
      cmdHistory.unshift(raw.trim());
      inner.innerHTML = "";
      addEcho(raw);
      runCommand(cmd);
      return;
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      if (histIdx < cmdHistory.length - 1) { histIdx++; input.value = cmdHistory[histIdx]; }
      return;
    }
    if (e.key === "ArrowDown") {
      e.preventDefault();
      histIdx > 0 ? (histIdx--, input.value = cmdHistory[histIdx]) : (histIdx = -1, input.value = "");
      return;
    }
  });

  function addEcho(text) {
    const d = document.createElement("div");
    d.className = "echo";
    d.innerHTML = '<span class="g">ali</span><span class="w">@portfolio:~$&nbsp;</span>'
                + '<span style="color:#9be9a8">' + esc(text) + '</span>';
    inner.appendChild(d);
  }

  function addLine(html) {
    const d = document.createElement("div");
    d.className = "line";
    d.innerHTML = html;
    inner.appendChild(d);
  }

  function addSep() {
    const hr = document.createElement("hr");
    hr.className = "sep";
    inner.appendChild(hr);
  }

  function addProjSep() {
    const hr = document.createElement("hr");
    hr.className = "proj-sep";
    inner.appendChild(hr);
  }

  function addGap() {
    const d = document.createElement("div");
    d.style.height = "5px";
    inner.appendChild(d);
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function imgSlot(src) {
    const slot = document.createElement("div");
    slot.className = "proj-img-slot";
    if (src) {
      const img = document.createElement("img");
      img.src = src;
      img.alt = "";
      img.onerror = function() {
        this.parentElement.innerHTML = phHTML();
      };
      slot.appendChild(img);
    } else {
      slot.innerHTML = phHTML();
    }
    return slot;
  }

  function phHTML() {
    return `<div class="ph">
      <svg width="36" height="36" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="8" width="40" height="28" rx="3" stroke="#6ddb7a" stroke-width="2"/>
        <path d="M4 30 L14 19 L22 27 L31 17 L44 30" stroke="#6ddb7a" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="14" cy="17" r="3" stroke="#6ddb7a" stroke-width="2"/>
        <path d="M17 40 H31" stroke="#6ddb7a" stroke-width="2" stroke-linecap="round"/>
        <path d="M24 36 V40" stroke="#6ddb7a" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>screenshot</span>
    </div>`;
  }

  /* imgs: array of 3 filenames or nulls */
  function addProject(name, tags, bullets, imgs) {
    const card = document.createElement("div");
    card.className = "proj-card";

    const tagHTML = tags.map(t => `<span class="proj-tag">${t}</span>`).join("");
    const liHTML  = bullets.map(b => `<li>${b}</li>`).join("");

    card.innerHTML = `
      <div class="proj-name">⟫ ${name}</div>
      <div class="proj-tags">${tagHTML}</div>
      <ul class="proj-bullets">${liHTML}</ul>
    `;

    // build the 3-image row
    const row = document.createElement("div");
    row.className = "proj-imgs";
    (imgs || [null, null, null]).forEach(src => row.appendChild(imgSlot(src)));
    card.appendChild(row);

    inner.appendChild(card);
  }

  function runCommand(cmd) {
    switch(cmd) {

      case "help":
        addGap();
        addLine('<span class="g">Available Commands:</span>');
        addLine('<span class="g">⟫ whoami</span><span class="w">        — Learn more about me</span>');
        addLine('<span class="g">⟫ skills</span><span class="w">        — See my skills</span>');
        addLine('<span class="g">⟫ projects</span><span class="w">      — View my projects</span>');
        addLine('<span class="g">⟫ contact</span><span class="w">       — Get in touch</span>');
        addLine('<span class="g">⟫ clear</span><span class="w">         — Clear the screen</span>');
        addLine('<span class="g">⟫ help</span><span class="w">          — Show commands</span>');
        break;

      case "whoami": {
        addGap();
        const card = document.createElement("div");
        card.className = "whoami-card";
        card.innerHTML = `
          <div class="whoami-top">
            <div class="avatar-ring">
              <img src="profile pic.jpg" alt="Ali"
                onerror="this.style.display='none';this.parentElement.innerHTML='<span style=&quot;font-size:56px;&quot;>👤</span>';">
            </div>
            <div class="whoami-name">Hi, I am Ali</div>
            <div class="whoami-title">
              Penetration Tester &amp; Computer Science Student<br>
              <span class="univ">@ Ain Shams University</span>
            </div>
          </div>
          <hr class="whoami-hr">
          <div class="whoami-bio">
            <div class="bio-title">⟫ About Me</div>
            <p>I am a dedicated computer science student with a strong passion for cybersecurity and ethical hacking. I enjoy learning new technologies, solving complex problems, and applying my knowledge through hands-on projects, CTF competitions, and teamwork.</p>
            <p>I have experience in network security, penetration testing, and vulnerability assessments. I have participated in summer training programs, internships, and volunteering activities that enhanced my practical skills — including web development, AI projects, contract writing, and IT operations.</p>
            <p>I am committed to continuous learning and contributing to real-world security challenges. My goal is to become a professional penetration tester and security researcher, combining technical expertise with problem-solving and creativity.</p>
          </div>
        `;
        inner.appendChild(card);
        break;
      }

      case "skills":
        addGap();
        addLine('<span class="g">Technical Skills</span>');
        addSep();
        addLine('<span class="g">⟫ Programming Languages</span>');
        addLine('<span class="w">   C++, C#, Python, Java, JavaScript, HTML/CSS, SQL</span>');
        addGap();
        addLine('<span class="g">⟫ Cybersecurity</span>');
        addLine('<span class="w">   Penetration Testing, Vulnerability Assessment, Network Security</span>');
        addGap();
        addLine('<span class="g">⟫ Software Development</span>');
        addLine('<span class="w">   OOP, Data Structures &amp; Algorithms</span>');
        addGap();
        addLine('<span class="g">⟫ Tools &amp; Platforms</span>');
        addLine('<span class="w">   Git/GitHub, Linux, Qt, Wireshark, Nmap, Burp Suite</span>');
        addGap();
        addLine('<span class="g">⟫ Languages</span>');
        addLine('<span class="w">   Arabic (native), English</span>');
        addGap();
        addLine('<span class="g">⟫ Soft Skills</span>');
        addLine('<span class="w">   Public Speaking, Presentation, Teamwork, Problem-Solving</span>');
        break;

      case "projects":
        addGap();
        addLine('<span class="g">Projects</span>');
        addSep();
        addGap();

        addProject(
          "Watch-It",
          ["Java", "OOP", "JSON", "Team Project"],
          [
            "Recreated a movie streaming platform applying OOP, JSON handling, and exception management.",
            "User features: account creation, subscriptions, personalized lists, ratings with recommendations, advanced search &amp; filtering.",
            "Admin features: CRUD operations, subscription analytics, revenue tracking, and user activity monitoring.",
            "Built collaboratively with a team to simulate a real-world entertainment platform."
          ],
          ["projects/show_screen.jpg", "projects/home_page_continued.jpg","projects/search.jpg", "projects/user_login.jpg","projects/admin_dashboard.jpg"]
        );

        addProjSep();

        addProject(
          "Operating Systems Project — FOS",
          ["C", "OS", "Memory Management"],
          [
            "Developed kernel-level OS components focusing on memory management.",
            "Implemented a dynamic memory allocator and page replacement algorithms: LRU and Modified Clock.",
            "Built and optimized page fault handling mechanisms to ensure system stability.",
            "Applied core OS concepts: paging, working sets, and system-level testing."
          ],
          []
        );

        addProjSep();

        addProject(
          "Wasalni",
          ["C++", "Qt", "JSON", "Graph Algorithms", "Team Project"],
          [
            "Developed a city routing visualizer with persistent map data using C++, Qt, and JSON.",
            "Features: create and edit city networks, save maps, and run real-time route calculations.",
            "Implemented graph algorithms: DFS, BFS, Dijkstra's, and Floyd-Warshall.",
            "Completed as a team project, bringing graph algorithms to life through an interactive visual tool."
          ],
          ["projects/image.png"]
        );

        break;

      case "contact":
        addGap();
        addLine('<span class="g">Get In Touch</span>');
        addSep();
        addLine('<span class="g">⟫ Email:&nbsp;&nbsp;&nbsp;</span><a class="contact-link" href="mailto:alimohamedali7704@gmail.com">alimohamedali7704@gmail.com</a>');
        addLine('<span class="g">⟫ GitHub:&nbsp;&nbsp;</span><a class="contact-link" href="https://github.com/alimohamed7704" target="_blank">github.com/alimohamed7704</a>');
        addLine('<span class="g">⟫ LinkedIn:</span><a class="contact-link" href="https://www.linkedin.com/in/ali-mohamed-a3532331a/" target="_blank">linkedin.com/in/Ali-Mohamed</a>');
        break;

      case "clear":
        inner.innerHTML = "";
        break;

      default:
        addLine('<span class="r">Command not found: \'' + esc(cmd) + '\'</span>'
              + '<span class="w"> — Type </span><span class="g">help</span><span class="w"> for available commands.</span>');
    }

    outEl.scrollTop = 0;
  }

  document.addEventListener("click", () => input.focus());
</script>
</body>
</html>
