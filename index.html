<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Mohamed | Penetration Tester</title>
<link rel="icon" type="image/jpeg" href="profile pic.jpg">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background-image: url("background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    height: 100vh;
    overflow: hidden;
    padding: 8px;
  }

  .terminal-wrapper {
    width: 100%;
    max-width: 1500px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(155,233,168,0.13);
    border-radius: 10px;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  .input-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 13px 24px;
    border-bottom: 1px solid rgba(155,233,168,0.12);
    gap: 0;
  }

  .p-user { color:#529f5b; font-size:clamp(13px,2vw,20px); font-weight:bold; }
  .p-rest { color:#e8e8e8; font-size:clamp(13px,2vw,20px); margin-right:-3px; }

  #cmd {
    background: transparent;
    border: none;
    outline: none;
    color: #6ddb7a;
    font-family: "Courier New", monospace;
    font-size: clamp(13px,2vw,20px);
    flex: 1;
    caret-color: #6ddb7a;
    min-width: 0;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 18px 24px 12px 24px;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: rgba(155,233,168,0.2) transparent;
  }
  #output::-webkit-scrollbar { width:5px; }
  #output::-webkit-scrollbar-thumb { background:rgba(155,233,168,0.2); border-radius:3px; }
  #out-inner { margin-top:0; }

  .line {
    font-size: clamp(12px,1.8vw,18px);
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.4em;
  }
  .g { color:#6ddb7a; }
  .w { color:#e8e8e8; }
  .r { color:#ff6b6b; }

  hr.sep      { border:none; border-top:1px solid rgba(232,232,232,0.25); margin:3px 0; }
  hr.proj-sep { border:none; border-top:1px solid rgba(109,219,122,0.12); margin:18px 0; }

  .echo { font-size:clamp(12px,1.8vw,18px); line-height:1.85; margin-top:4px; }

  .contact-link { color:#6ddb7a; text-decoration:none; word-break:break-all; }
  .contact-link:hover { text-decoration:underline; color:#9be9a8; }

  .hint-bar {
    flex-shrink: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 5px 24px 8px 24px;
    border-top: 1px solid rgba(155,233,168,0.08);
    background: rgba(10,18,35,0.3);
    font-size: clamp(11px,1.6vw,20px);
    gap: 3px;
    flex-wrap: wrap;
  }
  .hint-bar .hw { color:#e8e8e8; }
  .hint-bar .hg { color:#6ddb7a; }

  .tw-cursor {
    display: inline-block;
    width: 8px; height: 1.1em;
    background: #6ddb7a;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink .7s step-end infinite;
  }
  @keyframes blink { 50%{opacity:0;} }

  @keyframes simpleFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-in         { opacity:0; animation: simpleFadeIn 0.6s ease-out forwards; }
  .card-glow-enter { opacity:0; animation: simpleFadeIn 0.9s ease-out forwards; }

  /* whoami */
  .whoami-card { display:flex; flex-direction:column; align-items:center; padding:18px 0 14px; }
  .whoami-top  { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:24px; }
  .avatar-ring {
    width:clamp(80px,12vw,140px); height:clamp(80px,12vw,140px);
    border-radius:50%; border:2px solid #6ddb7a;
    box-shadow:0 0 24px rgba(109,219,122,.35);
    background:rgba(109,219,122,.07);
    overflow:hidden; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .avatar-ring img { width:100%; height:100%; object-fit:cover; border-radius:50%; opacity:0; }
  .avatar-ring img.img-revealed { animation: simpleFadeIn 0.9s ease-out forwards; }

  .whoami-name  { color:#6ddb7a; font-size:clamp(16px,2.5vw,24px); font-weight:bold; text-align:center; min-height:1.4em; }
  .whoami-title { color:#e8e8e8; font-size:clamp(12px,1.8vw,18px); text-align:center; line-height:1.75; min-height:1.4em; }
  .whoami-title .univ { color:#6ddb7a; }
  .whoami-hr   { width:80%; border:none; border-top:1px solid rgba(232,232,232,0.2); margin-bottom:20px; }
  .whoami-bio  { width:100%; font-size:clamp(12px,1.5vw,16px); line-height:1.95; color:#e8e8e8; }
  .whoami-bio .bio-title { color:#6ddb7a; font-size:clamp(13px,1.6vw,17px); font-weight:bold; margin-bottom:10px; min-height:1.4em; }
  .whoami-bio p { margin-bottom:13px; min-height:1.4em; }

  /* projects */
  .proj-card   { display:flex; flex-direction:column; }
  .proj-name   { color:#6ddb7a; font-size:clamp(13px,1.8vw,18px); font-weight:bold; margin-bottom:5px; min-height:1.4em; }
  .proj-tags   { margin-bottom:8px; }
  .proj-tag    { display:inline-block; font-size:clamp(10px,1.1vw,12px); color:#529f5b; border:1px solid rgba(82,159,91,.4); border-radius:3px; padding:0 7px; margin-right:5px; margin-bottom:4px; }
  .proj-bullets { list-style:none; padding:0; margin:0 0 14px 0; }
  .proj-bullets li { font-size:clamp(11px,1.5vw,15px); color:#e8e8e8; line-height:1.75; padding-left:16px; position:relative; min-height:1.4em; }
  .proj-bullets li::before { content:"›"; position:absolute; left:0; color:#529f5b; }

  .proj-imgs { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:4px; }
  @media(max-width:600px)                       { .proj-imgs{grid-template-columns:1fr;} }
  @media(min-width:601px) and (max-width:900px) { .proj-imgs{grid-template-columns:repeat(2,1fr);} }

  .proj-img-slot {
    aspect-ratio:16/9; border-radius:6px;
    border:1px solid rgba(109,219,122,.22); box-shadow:0 4px 16px rgba(0,0,0,.5);
    overflow:hidden; background:rgba(8,20,12,.7);
    display:flex; align-items:center; justify-content:center;
    opacity:0;
  }
  .proj-img-slot img   { width:100%; height:100%; object-fit:cover; display:block; opacity:0; }
  .proj-img-slot img.img-revealed   { animation: simpleFadeIn 0.9s ease-out forwards; }
  .proj-img-slot video { width:100%; height:100%; object-fit:cover; display:block; opacity:0; }
  .proj-img-slot video.img-revealed { animation: simpleFadeIn 0.9s ease-out forwards; }

  .proj-img-slot .ph { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; width:100%; height:100%; color:rgba(109,219,122,.3); font-size:12px; }
  .proj-img-slot .ph svg { opacity:.28; }

  @media(max-width:480px) {
    body { padding:4px; }
    .terminal-wrapper { height:96vh; border-radius:6px; }
    .input-bar { padding:10px 12px; }
    #output { padding:12px 12px 8px 12px; }
    .hint-bar { padding:4px 12px 6px; justify-content:center; }
    .whoami-hr { width:90%; }
  }
</style>
</head>
<body>
<div class="terminal-wrapper">
  <div class="input-bar">
    <span class="p-user">ali</span><span class="p-rest">@portfolio:~$&nbsp;</span>
    <input id="cmd" autofocus autocomplete="off" spellcheck="false">
  </div>
  <div id="output"><div id="out-inner"></div></div>
  <div class="hint-bar">
    <span class="hw">Hint:&nbsp; Type </span><span class="hg">"help"</span><span class="hw"> for commands.</span>
  </div>
</div>

<script>
const CHAR_MS = 32;
const SLOW_MS = 800;

const outEl = document.getElementById("output");
const inner = document.getElementById("out-inner");
const input = document.getElementById("cmd");

/* ── Generation counter ──────────────────────────────────────────
   Every time we reset, gen is incremented.
   Every async callback captures its own gen at creation time and
   does nothing if gen has moved on. This is the single source of
   truth for "is this animation still wanted?" — no other flag needed.
   ──────────────────────────────────────────────────────────────── */
let gen        = 0;   // current generation
let queue      = [];
let running    = false;
let cmdHistory = [];
let histIdx    = -1;

function reset() {
  gen++;            // invalidate ALL pending callbacks instantly
  queue    = [];
  running  = false;
}

function startEngine() {
  if (!running) pump();
}

function pump() {
  if (queue.length === 0) { running = false; return; }
  running = true;
  queue.shift()(pump);
}

/* safe setTimeout — fires only if gen hasn't changed */
function later(ms, g, fn) {
  setTimeout(function() { if (gen === g) fn(); }, ms);
}

function softScroll() {
  const d = outEl.scrollHeight - outEl.scrollTop - outEl.clientHeight;
  if (d < 120) outEl.scrollTop = outEl.scrollHeight;
}

/* ── typeText ──────────────────────────────────────────────────── */
function typeText(el, text, g, done) {
  let i = 0;
  function tick() {
    if (gen !== g) return;          // generation mismatch — stop dead
    if (i >= text.length) { done(); return; }
    el.textContent += text[i++];
    softScroll();
    later(CHAR_MS, g, tick);
  }
  tick();
}

/* ── qLineTyped ────────────────────────────────────────────────── */
function qLineTyped(segments, cls, style) {
  queue.push(function(next) {
    const g = gen;
    if (gen !== g) return;  // shouldn't happen but guard anyway

    const div = document.createElement("div");
    div.className = cls || "line";
    if (style) div.setAttribute("style", style);
    inner.appendChild(div);

    const cur = document.createElement("span");
    cur.className = "tw-cursor";
    div.appendChild(cur);

    const spanEls = segments.map(seg => {
      let el;
      if (seg.href) {
        el = document.createElement("a");
        el.href = seg.href;
        el.className = "contact-link";
        if (seg.target) el.target = seg.target;
      } else {
        el = document.createElement("span");
      }
      if (seg.color) el.style.color = seg.color;
      div.insertBefore(el, cur);
      return el;
    });

    softScroll();
    let si = 0;

    function nextSeg() {
      if (gen !== g) return;
      if (si >= segments.length) {
        cur.remove();
        softScroll();
        later(60, g, next);
        return;
      }
      const el   = spanEls[si];
      const text = segments[si].text;
      si++;
      let ci = 0;
      function typeChar() {
        if (gen !== g) return;
        if (ci >= text.length) { nextSeg(); return; }
        el.textContent += text[ci++];
        softScroll();
        later(CHAR_MS, g, typeChar);
      }
      typeChar();
    }
    nextSeg();
  });
}

/* ── qLinePop ──────────────────────────────────────────────────── */
function qLinePop(segments, cls, style) {
  queue.push(function(next) {
    const g = gen;
    const div = document.createElement("div");
    div.className = (cls || "line") + " fade-in";
    if (style) div.setAttribute("style", style);
    segments.forEach(seg => {
      let el;
      if (seg.href) {
        el = document.createElement("a");
        el.href = seg.href;
        el.className = "contact-link";
        if (seg.target) el.target = seg.target;
      } else {
        el = document.createElement("span");
      }
      if (seg.color) el.style.color = seg.color;
      el.textContent = seg.text;
      div.appendChild(el);
    });
    inner.appendChild(div);
    softScroll();
    later(SLOW_MS, g, next);
  });
}

/* ── qSep / qGap ───────────────────────────────────────────────── */
function qSep(cls) {
  queue.push(function(next) {
    const g = gen;
    const hr = document.createElement("hr");
    hr.className = cls || "sep";
    inner.appendChild(hr);
    later(20, g, next);
  });
}
function qGap() {
  queue.push(function(next) {
    const g = gen;
    const d = document.createElement("div"); d.style.height = "5px";
    inner.appendChild(d);
    later(5, g, next);
  });
}

/* ── convenience wrappers ──────────────────────────────────────── */
function addLineTyped(g, w) {
  const segs = [];
  if (g) segs.push({ text: g, color: "#6ddb7a" });
  if (w) segs.push({ text: w, color: "#e8e8e8" });
  qLineTyped(segs);
}
function addLineTypedRaw(segs) { qLineTyped(segs); }

function addLinePop(g, w) {
  const segs = [];
  if (g) segs.push({ text: g, color: "#6ddb7a" });
  if (w) segs.push({ text: w, color: "#e8e8e8" });
  qLinePop(segs);
}
function addLinePopRaw(segs) { qLinePop(segs); }

function addSep()     { qSep("sep"); }
function addProjSep() { qSep("proj-sep"); }
function addGap()     { qGap(); }

/* ── image / video helpers ─────────────────────────────────────── */
function phHTML() {
  return `<div class="ph">
    <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
      <rect x="4" y="8" width="40" height="28" rx="3" stroke="#6ddb7a" stroke-width="2"/>
      <path d="M4 30 L14 19 L22 27 L31 17 L44 30" stroke="#6ddb7a" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="14" cy="17" r="3" stroke="#6ddb7a" stroke-width="2"/>
      <path d="M17 40 H31" stroke="#6ddb7a" stroke-width="2" stroke-linecap="round"/>
      <path d="M24 36 V40" stroke="#6ddb7a" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>screenshot</span>
  </div>`;
}

function imgSlot(src) {
  const slot = document.createElement("div");
  slot.className = "proj-img-slot";
  if (src) {
    const img = document.createElement("img");
    img.src = src; img.alt = "";
    img.onload  = function() { this.classList.add("img-revealed"); };
    img.onerror = function() { slot.style.opacity = "1"; slot.innerHTML = phHTML(); };
    slot.appendChild(img);
  } else {
    slot.style.opacity = "1";
    slot.innerHTML = phHTML();
  }
  return slot;
}

function videoSlot(src) {
  const slot = document.createElement("div");
  slot.className = "proj-img-slot";
  const vid = document.createElement("video");
  vid.src = src;
  vid.autoplay = true;
  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;
  vid.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;opacity:0;";
  vid.oncanplay = function() {
    if (!vid._revealed) { vid._revealed = true; vid.classList.add("img-revealed"); }
  };
  vid.onerror = function() {
    slot.style.opacity = "1";
    slot.innerHTML = `<div class="ph">
      <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="8" width="40" height="28" rx="3" stroke="#6ddb7a" stroke-width="2"/>
        <polygon points="19,16 35,24 19,32" fill="#6ddb7a" opacity="0.5"/>
      </svg><span>video</span></div>`;
  };
  slot.appendChild(vid);
  return slot;
}

function glowEnterAll(els, baseDelay, g) {
  els.forEach((el, i) => {
    later(baseDelay + i * 200, g, function() { el.classList.add("card-glow-enter"); });
  });
}

/* ══════════════════════════════════════════════════════════════
   WHOAMI
   ══════════════════════════════════════════════════════════════ */
function addWhoami() {
  queue.push(function(next) {
    const g = gen;

    const card = document.createElement("div");
    card.className = "whoami-card";
    inner.appendChild(card);

    const top = document.createElement("div");
    top.className = "whoami-top";
    card.appendChild(top);

    const ring = document.createElement("div");
    ring.className = "avatar-ring";
    const profImg = document.createElement("img");
    profImg.src = "profile pic.jpg"; profImg.alt = "Ali";
    profImg.onload  = function() { this.classList.add("img-revealed"); };
    profImg.onerror = function() {
      this.style.display = "none";
      this.parentElement.innerHTML = '<span style="font-size:56px">👤</span>';
    };
    ring.appendChild(profImg);
    ring.style.opacity = "0";
    top.appendChild(ring);
    later(100, g, function() { ring.classList.add("card-glow-enter"); });

    const nameEl    = document.createElement("div"); nameEl.className  = "whoami-name";  top.appendChild(nameEl);
    const titleEl   = document.createElement("div"); titleEl.className = "whoami-title"; top.appendChild(titleEl);
    const titleText = document.createTextNode("");
    const univEl    = document.createElement("span"); univEl.className = "univ";
    titleEl.appendChild(titleText);
    titleEl.appendChild(document.createElement("br"));
    titleEl.appendChild(univEl);

    const hr = document.createElement("hr"); hr.className = "whoami-hr"; card.appendChild(hr);
    const bio = document.createElement("div"); bio.className = "whoami-bio"; card.appendChild(bio);
    const bioTitleEl = document.createElement("div"); bioTitleEl.className = "bio-title"; bio.appendChild(bioTitleEl);

    softScroll();

    const typedPieces = [
      { target: nameEl,     text: "Hi, I am Ali" },
      { target: titleText,  text: "Penetration Tester & Computer Science Student" },
      { target: univEl,     text: "@ Ain Shams University" },
      { target: bioTitleEl, text: "⟫ About Me" },
    ];

    const bioLines = [
      "I am a dedicated computer science student with a strong passion for cybersecurity and ethical hacking.",
      "I enjoy learning new technologies, solving complex problems, and applying my knowledge through hands-on projects, CTF competitions, and teamwork.",
      "I have experience in network security, penetration testing, and vulnerability assessments.",
      "I have participated in summer training programs, internships, and volunteering activities that enhanced my practical skills including web",
      "development, AI projects, contract writing, and IT operations.",
      "I am committed to continuous learning and contributing to real-world security challenges.",
      "My goal is to become a professional penetration tester and security researcher, combining technical expertise with problem-solving and creativity.",
    ];

    let bi = 0;
    function runBio() {
      if (gen !== g) return;
      if (bi >= bioLines.length) { later(200, g, next); return; }
      const line = document.createElement("p");
      line.className = "fade-in";
      line.style.marginBottom = "3px";
      line.textContent = bioLines[bi++];
      bio.appendChild(line);
      softScroll();
      later(SLOW_MS, g, runBio);
    }

    let ti = 0;
    function nextTyped() {
      if (gen !== g) return;
      if (ti >= typedPieces.length) { runBio(); return; }
      const p = typedPieces[ti++];
      typeText(p.target, p.text, g, nextTyped);
    }
    nextTyped();
  });
}

/* ══════════════════════════════════════════════════════════════
   PROJECT CARD
   ══════════════════════════════════════════════════════════════ */
function addProject(name, tags, bullets, media) {
  queue.push(function(next) {
    const g = gen;

    const card = document.createElement("div");
    card.className = "proj-card";
    inner.appendChild(card);
    softScroll();

    const nameEl = document.createElement("div");
    nameEl.className = "proj-name";
    card.appendChild(nameEl);

    const tagsEl = document.createElement("div");
    tagsEl.className = "proj-tags";
    tags.forEach(t => {
      const s = document.createElement("span"); s.className = "proj-tag"; s.textContent = t;
      tagsEl.appendChild(s);
    });

    const ul = document.createElement("ul");
    ul.className = "proj-bullets";
    const liEls = bullets.map(b => {
      const li = document.createElement("li"); ul.appendChild(li);
      return { el: li, text: b };
    });

    const row = document.createElement("div");
    row.className = "proj-imgs";
    const slots = (media && media.length ? media : []).map(m => {
      const s = (m.type === "video") ? videoSlot(m.src) : imgSlot(m.src);
      row.appendChild(s);
      return s;
    });

    typeText(nameEl, "⟫ " + name, g, function() {
      if (gen !== g) return;
      card.appendChild(tagsEl);
      card.appendChild(ul);
      softScroll();

      let bi = 0;
      function nextBullet() {
        if (gen !== g) return;
        if (bi >= liEls.length) {
          if (slots.length > 0) {
            card.appendChild(row);
            softScroll();
            glowEnterAll(slots, 100, g);
            later(100 + slots.length * 200 + 400, g, next);
          } else {
            later(60, g, next);
          }
          return;
        }
        liEls[bi].el.textContent = liEls[bi].text;
        liEls[bi].el.classList.add("fade-in");
        bi++;
        softScroll();
        later(SLOW_MS, g, nextBullet);
      }
      nextBullet();
    });
  });
}

/* ══════════════════════════════════════════════════════════════
   INPUT HANDLING
   ══════════════════════════════════════════════════════════════ */
function addEcho(text) {
  const d = document.createElement("div"); d.className = "echo";
  d.innerHTML = '<span class="g">ali</span><span class="w">@portfolio:~$&nbsp;</span>'
              + '<span style="color:#9be9a8">' + esc(text) + '</span>';
  inner.appendChild(d);
}
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

input.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.key === "v" && !e.shiftKey) {
    e.preventDefault();
    reset(); inner.innerHTML = "";
    addEcho(input.value + "^V");
    addLineTypedRaw([
      {text:"Use ", color:"#e8e8e8"},
      {text:"Ctrl+Shift+V", color:"#6ddb7a"},
      {text:" to paste.", color:"#e8e8e8"}
    ]);
    startEngine();
    return;
  }

  if (e.key === "Enter") {
    const raw = input.value;
    const cmd = raw.trim().toLowerCase();
    input.value = ""; histIdx = -1;
    if (!raw.trim()) return;
    cmdHistory.unshift(raw.trim());
    reset();
    inner.innerHTML = "";
    addEcho(raw);
    runCommand(cmd);
    startEngine();
    return;
  }
  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; input.value = cmdHistory[histIdx]; }
    return;
  }
  if (e.key === "ArrowDown") {
    e.preventDefault();
    histIdx > 0 ? (histIdx--, input.value = cmdHistory[histIdx]) : (histIdx = -1, input.value = "");
    return;
  }
});

/* ══════════════════════════════════════════════════════════════
   COMMANDS

document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && !e.shiftKey && e.key === "c") {
    if (window.getSelection().toString().length > 0) return;
    e.preventDefault();
    reset(); inner.innerHTML = "";
    addEcho(input.value + "^C");
    input.value = ""; histIdx = -1;
    input.focus();
    return;
  }
  if (e.ctrlKey && !e.shiftKey && e.key === "v") e.preventDefault();
});
